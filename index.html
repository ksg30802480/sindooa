<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a3a5c">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="견적서">
<title>신도OA디지털 견적서</title>
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Malgun Gothic','맑은 고딕',sans-serif;background:#f0f0ea;color:#1a1a1a;font-size:14px;}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;}
.topbar{background:#1a3a5c;color:#fff;padding:12px 16px 8px;flex-shrink:0;}
.topbar h1{font-size:16px;font-weight:700;}
.topbar p{font-size:10px;opacity:0.6;margin-top:2px;}
.tabs{display:flex;background:#0f2640;flex-shrink:0;}
.tab{flex:1;padding:10px 4px;text-align:center;font-size:11px;color:rgba(255,255,255,0.6);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;}
.tab.active{color:#fff;border-bottom-color:#5ab4ff;}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.page{display:none;padding:0;}
.page.active{display:block;}
.sec{padding:12px 16px;border-bottom:1px solid #f0f0f0;background:#fff;margin-bottom:6px;}
.stit{font-size:10px;font-weight:700;color:#999;letter-spacing:1px;margin-bottom:10px;}
.frow{display:flex;gap:8px;margin-bottom:8px;}
.f{display:flex;flex-direction:column;gap:4px;flex:1;}
.f label{font-size:11px;color:#777;font-weight:600;}
.f input,.f textarea,.f select{padding:9px 11px;border:1px solid #ddd;border-radius:7px;font-size:14px;font-family:inherit;color:#1a1a1a;background:#fff;-webkit-appearance:none;appearance:none;}
.f input:focus,.f textarea:focus,.f select:focus{outline:none;border-color:#1a3a5c;}
.f textarea{resize:none;height:70px;}
.item-card{background:#fff;border:1px solid #e5e5e5;border-radius:8px;padding:12px;margin-bottom:8px;position:relative;}
.item-card .del{position:absolute;top:8px;right:8px;background:none;border:none;font-size:20px;color:#ccc;cursor:pointer;padding:2px 6px;}
.item-card .del:active{color:#e24b4a;}
.item-row{display:flex;gap:6px;margin-bottom:6px;}
.item-row .f input{font-size:13px;}
.item-total{text-align:right;font-size:13px;font-weight:700;color:#1a3a5c;margin-top:4px;}
.addbtn{width:100%;padding:10px;border:1.5px dashed #ccc;border-radius:8px;background:#fafafa;color:#888;cursor:pointer;font-size:13px;font-family:inherit;margin:4px 0 8px;}
.seal-zone{border:2px dashed #ddd;border-radius:10px;padding:20px;text-align:center;cursor:pointer;background:#fafafa;}
.seal-zone.on{border-style:solid;border-color:#1a3a5c;background:#f0f4f8;}
.seal-zone img{max-width:100px;max-height:100px;object-fit:contain;}
.summary-box{background:#eef3f8;border:1px solid #1a3a5c;border-radius:8px;padding:14px 16px;margin:0 16px 8px;}
.summary-box .row{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;}
.summary-box .row.total{font-size:16px;font-weight:700;color:#1a3a5c;border-top:1px solid #c0d0e0;margin-top:6px;padding-top:8px;}
.preview-wrap{padding:12px;background:#ddd;min-height:100%;}
.a4{background:#fff;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,0.15);font-size:10px;line-height:1.6;}
.qtit{text-align:center;font-size:18px;font-weight:800;letter-spacing:6px;padding-bottom:10px;border-bottom:2px double #1a3a5c;margin-bottom:14px;}
.qmeta{text-align:right;font-size:10px;color:#666;margin-bottom:10px;}
.qparties{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.qparty{border:1px solid #ccc;padding:8px 10px;position:relative;font-size:9px;}
.qplbl{font-size:9px;font-weight:800;color:#1a3a5c;letter-spacing:1px;margin-bottom:5px;}
.qparty table td{padding:1px 0;}
.qparty table td:first-child{color:#888;width:55px;}
.seal-on{position:absolute;bottom:5px;right:5px;width:55px;height:55px;object-fit:contain;opacity:0.85;}
.tot-banner{background:#eef3f8;border:1px solid #1a3a5c;padding:8px 12px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
.tot-banner .l{font-size:11px;font-weight:700;color:#1a3a5c;}
.tot-banner .r{font-size:14px;font-weight:800;color:#1a3a5c;}
.qitems{width:100%;border-collapse:collapse;font-size:9px;margin-bottom:10px;table-layout:fixed;}
.qitems th{background:#1a3a5c;color:#fff;padding:5px 4px;text-align:center;}
.qitems td{padding:4px;border-bottom:1px solid #eee;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.qitems .sub td{background:#f8f8f8;font-weight:700;}
.qitems .totrow td{background:#1a3a5c;color:#fff;font-weight:700;}
.qnote{font-size:9px;color:#555;border-left:2px solid #1a3a5c;padding-left:8px;margin-top:10px;line-height:1.7;}
.qbank{margin-top:10px;border:1px solid #eee;padding:8px 10px;font-size:9px;}
.qbank-t{font-size:8px;font-weight:700;color:#aaa;letter-spacing:1px;margin-bottom:5px;}
.qbank table td{padding:1px 8px 1px 0;color:#555;}
.qbank table td:first-child{color:#aaa;width:55px;}
.action-page{padding:16px;}
.act-btn{width:100%;padding:14px;border-radius:10px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;margin-bottom:10px;border:none;display:flex;align-items:center;justify-content:center;gap:10px;}
.act-pdf{background:#1a3a5c;color:#fff;}
.act-pdf:active{background:#0f2640;}
.act-kakao{background:#FEE500;color:#3A1D1D;}
.act-email{background:#fff;color:#1a3a5c;border:2px solid #1a3a5c;}
.act-fax{background:#fff;color:#444;border:2px solid #ddd;}
.act-hint{font-size:11px;color:#aaa;text-align:center;margin-top:4px;}
#loadingOverlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(26,58,92,0.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;color:#fff;}
#loadingOverlay p{margin-top:16px;font-size:14px;}
.spinner{width:40px;height:40px;border:4px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div id="loadingOverlay">
  <div class="spinner"></div>
  <p>한글 폰트 로딩 중...</p>
</div>

<div class="app">
  <div class="topbar">
    <h1>신도OA디지털 견적서</h1>
    <p>사업자번호: 134-16-53325 | 대표: 국승구</p>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="showTab(0)">공급자/고객</div>
    <div class="tab" onclick="showTab(1)">품목입력</div>
    <div class="tab" onclick="showTab(2)">미리보기</div>
    <div class="tab" onclick="showTab(3)">저장/전송</div>
  </div>
  <div class="content">

    <div class="page active" id="p0">
      <div class="sec">
        <div class="stit">견적 정보</div>
        <div class="frow">
          <div class="f"><label>문서번호</label><input type="text" id="docNo" placeholder="Q-2025-001" oninput="render()"></div>
          <div class="f"><label>견적일자</label><input type="date" id="docDate" oninput="render()"></div>
        </div>
      </div>
      <div class="sec">
        <div class="stit">공급자 (우리 회사)</div>
        <div class="frow"><div class="f"><label>사업자번호</label><input type="text" id="sRegNo" oninput="render()"></div></div>
        <div class="frow"><div class="f"><label>상호</label><input type="text" id="sName" oninput="render()"></div></div>
        <div class="frow">
          <div class="f"><label>전화</label><input type="tel" id="sTel" oninput="render()"></div>
          <div class="f"><label>팩스</label><input type="tel" id="sFax" oninput="render()"></div>
        </div>
        <div class="frow"><div class="f"><label>주소</label><input type="text" id="sAddr" oninput="render()"></div></div>
        <div class="frow"><div class="f"><label>대표자</label><input type="text" id="sCeo" oninput="render()"></div></div>
        <div style="margin-top:12px;">
          <div class="stit">직인 업로드</div>
          <div class="seal-zone" id="sealZone" onclick="document.getElementById('sealInput').click()">
            <div id="sealPh" style="color:#bbb;font-size:12px;line-height:2;">
              <div style="font-size:36px;">🔏</div>
              탭하여 직인 이미지 선택<br>
              <span style="font-size:10px;color:#ccc;">PNG 배경 투명 권장</span>
            </div>
            <img id="sealPrev" style="display:none;max-width:100px;max-height:100px;" alt="직인">
          </div>
          <input type="file" id="sealInput" accept="image/*" style="display:none;" onchange="loadSeal(this)">
          <button id="clearSealBtn" style="display:none;margin-top:6px;font-size:11px;color:#aaa;background:none;border:none;cursor:pointer;text-decoration:underline;width:100%;text-align:center;" onclick="clearSeal()">직인 제거</button>
        </div>
      </div>
      <div class="sec">
        <div class="stit">공급받는자 (고객)</div>
        <div class="frow"><div class="f"><label>회사명 / 성함</label><input type="text" id="bName" placeholder="고객사명" oninput="render()"></div></div>
        <div class="frow">
          <div class="f"><label>담당자</label><input type="text" id="bContact" placeholder="담당자명" oninput="render()"></div>
          <div class="f"><label>연락처</label><input type="tel" id="bTel" placeholder="010-0000-0000" oninput="render()"></div>
        </div>
      </div>
      <div class="sec">
        <div class="stit">메모 및 특이사항</div>
        <div class="f"><textarea id="note" oninput="render()"></textarea></div>
      </div>
      <div class="sec">
        <div class="stit">입금 계좌</div>
        <div class="frow">
          <div class="f"><label>은행명</label><input type="text" id="bankName" placeholder="국민은행" oninput="render()"></div>
          <div class="f"><label>계좌번호</label><input type="text" id="bankAcc" placeholder="000-00-000000" oninput="render()"></div>
        </div>
        <div class="frow"><div class="f"><label>예금주</label><input type="text" id="bankHolder" placeholder="신도OA디지털" oninput="render()"></div></div>
      </div>
    </div>

    <div class="page" id="p1">
      <div style="padding:12px 16px 4px;background:#fff;margin-bottom:6px;">
        <div class="stit">품목 내역</div>
        <div id="itemCards"></div>
        <button class="addbtn" onclick="addItem()">+ 품목 추가</button>
        <div class="frow" style="margin-top:8px;">
          <div class="f"><label>부가세</label>
            <select id="vatType" onchange="render()">
              <option value="10">포함 (10%)</option>
              <option value="0">별도 (10%)</option>
              <option value="exempt">면세</option>
            </select>
          </div>
          <div class="f"><label>할인율 (%)</label><input type="number" id="discRate" placeholder="0" min="0" max="100" oninput="render()"></div>
        </div>
      </div>
      <div class="summary-box" id="summaryBox"></div>
    </div>

    <div class="page" id="p2">
      <div class="preview-wrap">
        <div class="a4" id="preview"></div>
      </div>
    </div>

    <div class="page" id="p3">
      <div class="action-page">
        <button class="act-btn act-pdf" onclick="downloadPDF()">📄 PDF 저장 (한글 정상 출력)</button>
        <p class="act-hint" style="margin-bottom:14px;">저장 후 카카오톡·이메일·팩스로 전송하세요</p>
        <button class="act-btn act-kakao" onclick="openKakao()">💬 카카오톡으로 전송</button>
        <p class="act-hint" style="margin-bottom:14px;">ksg227@kakao.com</p>
        <button class="act-btn act-email" onclick="openEmail()">✉️ 이메일로 전송</button>
        <p class="act-hint" style="margin-bottom:14px;">sindoida@naver.com</p>
        <button class="act-btn act-fax" onclick="openFax()">📠 웹팩스로 전송</button>
        <p class="act-hint">031-601-8643</p>
      </div>
    </div>

  </div>
</div>

let nanumFontBase64=null;

const v=id=>document.getElementById(id)?.value||'';
const fmt=n=>Math.round(n).toLocaleString('ko-KR');

async function loadFont(){
  try{
    const res=await fetch('https://cdn.jsdelivr.net/gh/naver/nanumfont@master/NanumGothic.ttf');
    if(!res.ok)throw new Error();
    const buf=await res.arrayBuffer();
    const bytes=new Uint8Array(buf);
    let b='';
    for(let i=0;i<bytes.byteLength;i+=8192){
      b+=String.fromCharCode(...bytes.subarray(i,i+8192));
    }
    nanumFontBase64=btoa(b);
  }catch(e){
    nanumFontBase64=null;
  }
  document.getElementById('loadingOverlay').style.display='none';
}

function showTab(n){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===n));
  document.querySelectorAll('.page').forEach((p,i)=>p.classList.toggle('active',i===n));
  if(n===2)render();
}

function addItem(){items.push({name:'',unit:'개/EA/식',qty:1,price:0,note:''});renderCards();}
function removeItem(i){if(items.length<=1)return;items.splice(i,1);renderCards();}

function renderCards(){
  document.getElementById('itemCards').innerHTML=items.map((it,i)=>`
    <div class="item-card">
      <button class="del" onclick="removeItem(${i})">×</button>
      <div style="font-size:12px;font-weight:700;color:#1a3a5c;margin-bottom:8px;">품목 ${i+1}</div>
      <div class="item-row">
        <div class="f" style="flex:3;"><label>품목명</label><input type="text" value="${it.name}" placeholder="품목명" oninput="items[${i}].name=this.value;updateSummary()"></div>
        <div class="f" style="flex:1;"><label>단위</label><input type="text" value="${it.unit}" placeholder="개" oninput="items[${i}].unit=this.value"></div>
      </div>
      <div class="item-row">
        <div class="f"><label>수량</label><input type="number" value="${it.qty}" min="1" oninput="items[${i}].qty=+this.value||1;updateSummary()"></div>
        <div class="f"><label>공급가액(단가)</label><input type="number" value="${it.price}" min="0" oninput="items[${i}].price=+this.value||0;updateSummary()"></div>
      </div>
      <div class="item-row">
        <div class="f"><label>비고</label><input type="text" value="${it.note}" placeholder="특이사항" oninput="items[${i}].note=this.value"></div>
      </div>
      <div class="item-total">합계: ₩${fmt(it.qty*it.price)}</div>
    </div>`).join('');
  updateSummary();
}

function calcTotals(){
  const sub=items.reduce((s,it)=>s+it.qty*it.price,0);
  const dr=parseFloat(v('discRate'))||0;
  const disc=sub*dr/100;
  const after=sub-disc;
  const vt=v('vatType');
  let vat=0,total=after;
  if(vt==='10'){vat=Math.round(after/11);total=after;}
  else if(vt==='0'){vat=Math.round(after*0.1);total=after+vat;}
  return{sub,disc,after,vat,total,vt};
}

function updateSummary(){
  const t=calcTotals();
  const dr=parseFloat(v('discRate'))||0;
  const vatLabel=t.vt==='exempt'?'면세':'부가세(10%)';
  let html=`<div class="row"><span>소계</span><span>₩${fmt(t.sub)}</span></div>`;
  if(t.disc>0)html+=`<div class="row"><span>할인(${dr}%)</span><span style="color:#e24b4a">-₩${fmt(t.disc)}</span></div>`;
  if(t.vt!=='exempt')html+=`<div class="row"><span>${vatLabel}</span><span>₩${fmt(t.vat)}</span></div>`;
  html+=`<div class="row total"><span>합계금액</span><span>₩${fmt(t.total)}</span></div>`;
  document.getElementById('summaryBox').innerHTML=html;
}

function render(){
  const t=calcTotals();
  const dd=v('docDate')||new Date().toISOString().slice(0,10);
  const sealHtml=sealUrl?`<img class="seal-on" src="${sealUrl}" alt="직인">`:'';
  const vatLabel=t.vt==='exempt'?'면세':'부가세(10%)';
  const rows=items.map((it,i)=>`<tr>
    <td>${i+1}</td><td style="text-align:left">${it.name||'-'}</td>
    <td>${it.unit||'-'}</td><td>${fmt(it.qty)}</td>
    <td style="text-align:right">${fmt(it.price)}</td>
    <td style="text-align:right;font-weight:700">${fmt(it.qty*it.price)}</td>
    <td style="font-size:8px">${it.note||''}</td></tr>`).join('');
  const discRow=t.disc>0?`<tr class="sub"><td colspan="5" style="text-align:right">할인(${v('discRate')}%)</td><td style="text-align:right;color:#e24b4a">-${fmt(t.disc)}</td><td></td></tr>`:'';
  const vatRow=t.vt!=='exempt'?`<tr class="sub"><td colspan="5" style="text-align:right">${vatLabel}</td><td style="text-align:right">${fmt(t.vat)}</td><td></td></tr>`:'';
  const noteHtml=v('note')?`<div class="qnote">${v('note').replace(/\n/g,'<br>')}</div>`:'';
  const bankHtml=(v('bankName')||v('bankAcc'))?`<div class="qbank"><div class="qbank-t">입금 계좌 안내</div><table><tr><td>은행</td><td>${v('bankName')}</td></tr><tr><td>계좌번호</td><td>${v('bankAcc')}</td></tr><tr><td>예금주</td><td>${v('bankHolder')}</td></tr></table></div>`:'';
  document.getElementById('preview').innerHTML=`
    <div class="qtit">견 적 서</div>
    <div class="qmeta">문서번호: ${v('docNo')||'—'} &nbsp;|&nbsp; 견적일자: ${dd}</div>
    <div class="qparties">
      <div class="qparty"><div class="qplbl">공급받는자</div>
        <table><tr><td>상호</td><td><b>${v('bName')||'—'}</b> 귀중</td></tr>
        <tr><td>담당자</td><td>${v('bContact')||'—'}</td></tr>
        <tr><td>연락처</td><td>${v('bTel')||'—'}</td></tr></table>
      </div>
      <div class="qparty"><div class="qplbl">공급자</div>
        <table><tr><td>사업자</td><td>${v('sRegNo')||'—'}</td></tr>
        <tr><td>상호</td><td><b>${v('sName')||'—'}</b></td></tr>
        <tr><td>전화</td><td>${v('sTel')||'—'}</td></tr>
        <tr><td>팩스</td><td>${v('sFax')||'—'}</td></tr>
        <tr><td>주소</td><td>${v('sAddr')||'—'}</td></tr>
        <tr><td>대표자</td><td>${v('sCeo')||'—'} (인)</td></tr></table>
        ${sealHtml}
      </div>
    </div>
    <div class="tot-banner"><span class="l">총 견적금액</span><span class="r">₩ ${fmt(t.total)} 원</span></div>
    <table class="qitems">
      <colgroup><col style="width:18px"><col><col style="width:22px"><col style="width:26px"><col style="width:52px"><col style="width:52px"><col style="width:44px"></colgroup>
      <thead><tr><th>No</th><th>품목</th><th>단위</th><th>수량</th><th>공급가액</th><th>합계</th><th>비고</th></tr></thead>
      <tbody>${rows}
        <tr class="sub"><td colspan="5" style="text-align:right">소계</td><td style="text-align:right">${fmt(t.sub)}</td><td></td></tr>
        ${discRow}${vatRow}
        <tr class="totrow"><td colspan="5" style="text-align:right;padding:5px">합계금액</td><td style="text-align:right;padding:5px">₩${fmt(t.total)}</td><td></td></tr>
      </tbody>
    </table>
    ${noteHtml}${bankHtml}`;
}

function loadSeal(input){
  const file=input.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    sealUrl=e.target.result;
    document.getElementById('sealPrev').src=sealUrl;
    document.getElementById('sealPrev').style.display='block';
    document.getElementById('sealPh').style.display='none';
    document.getElementById('sealZone').classList.add('on');
    document.getElementById('clearSealBtn').style.display='block';
  };r.readAsDataURL(file);
}
function clearSeal(){
  sealUrl=null;
  document.getElementById('sealPrev').style.display='none';
  document.getElementById('sealPh').style.display='block';
  document.getElementById('sealZone').classList.remove('on');
  document.getElementById('clearSealBtn').style.display='none';
  document.getElementById('sealInput').value='';
}

function downloadPDF(){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF('p','mm','a4');

  if(nanumFontBase64){
    doc.addFileToVFS('NanumGothic.ttf', nanumFontBase64);
    doc.addFont('NanumGothic.ttf','NanumGothic','normal');
    doc.setFont('NanumGothic');
  }

  const t=calcTotals();
  const dd=v('docDate')||new Date().toISOString().slice(0,10);
  const mL=18,mR=192,pW=210;
  let y=18;

  const setF=(size,bold)=>{
    doc.setFontSize(size);
    if(nanumFontBase64){doc.setFont('NanumGothic','normal');}
    else{doc.setFont('helvetica',bold?'bold':'normal');}
  };

  setF(20,true);doc.setTextColor(26,58,92);
  doc.text('견  적  서',pW/2,y+7,{align:'center'});y+=16;
  doc.setDrawColor(26,58,92);doc.setLineWidth(0.7);doc.line(mL,y,mR,y);y+=5;

  setF(8,false);doc.setTextColor(100,100,100);
  doc.text('문서번호: '+(v('docNo')||'—'),mL,y);
  doc.text('견적일자: '+dd,mR,y,{align:'right'});y+=9;

  const bW=(mR-mL-5)/2,bH=38;
  doc.setDrawColor(180,180,180);doc.setLineWidth(0.3);
  doc.rect(mL,y,bW,bH);doc.rect(mL+bW+5,y,bW,bH);

  setF(7,true);doc.setTextColor(26,58,92);
  doc.text('공급받는자',mL+2,y+5);doc.text('공급자',mL+bW+7,y+5);

  setF(7.5,false);doc.setTextColor(40,40,40);
  const bLines=[
    '상호: '+(v('bName')||'—')+' 귀중',
    '담당: '+(v('bContact')||'—'),
    '연락: '+(v('bTel')||'—'),
  ];
  bLines.forEach((l,i)=>doc.text(l,mL+2,y+11+i*7.5));

  const sLines=[
    '사업자: '+(v('sRegNo')||'—'),
    '상호: '+(v('sName')||'—'),
    '전화: '+(v('sTel')||'—'),
    '팩스: '+(v('sFax')||'—'),
    '주소: '+(v('sAddr')||'—'),
    '대표자: '+(v('sCeo')||'—')+' (인)',
  ];
  sLines.forEach((l,i)=>doc.text(l,mL+bW+7,y+11+i*4.6));

  if(sealUrl){try{doc.addImage(sealUrl,'PNG',mL+bW*2-2,y+14,20,20);}catch(e){}}
  y+=bH+7;

  doc.setFillColor(238,243,248);doc.setDrawColor(26,58,92);doc.setLineWidth(0.5);
  doc.rect(mL,y,mR-mL,11,'FD');
  setF(9.5,true);doc.setTextColor(26,58,92);
  doc.text('총 견적금액',mL+3,y+7.5);
  doc.text('₩ '+fmt(t.total)+' 원',mR-2,y+7.5,{align:'right'});
  y+=15;

  const heads=[['No.','품목','단위','수량','공급가액','합계','비고']];
  const trows=items.map((it,i)=>[
    String(i+1), it.name||'-', it.unit||'-',
    fmt(it.qty), fmt(it.price), fmt(it.qty*it.price), it.note||''
  ]);
  trows.push(['','','','','소계',fmt(t.sub),'']);
  if(t.disc>0)trows.push(['','','','','할인('+v('discRate')+'%)','- '+fmt(t.disc),'']);
  if(t.vt!=='exempt')trows.push(['','','','','부가세(10%)',fmt(t.vat),'']);
  trows.push(['','','','','합계금액','₩ '+fmt(t.total),'']);

  const fontName=nanumFontBase64?'NanumGothic':'helvetica';

  doc.autoTable({
    startY:y,
    head:heads,
    body:trows,
    margin:{left:mL,right:pW-mR},
    styles:{fontSize:8,cellPadding:2.5,font:fontName},
    headStyles:{fillColor:[26,58,92],textColor:255,fontStyle:'normal',halign:'center',font:fontName},
    columnStyles:{
      0:{halign:'center',cellWidth:10},
      1:{halign:'left'},
      2:{halign:'center',cellWidth:12},
      3:{halign:'center',cellWidth:14},
      4:{halign:'right',cellWidth:25},
      5:{halign:'right',cellWidth:25},
      6:{halign:'left',cellWidth:20}
    },
    didParseCell:(d)=>{
      if(d.row.index>=trows.length-4 && d.section==='body'){
        d.cell.styles.fontStyle='normal';
      }
      if(d.row.index===trows.length-1 && d.section==='body'){
        d.cell.styles.fillColor=[26,58,92];
        d.cell.styles.textColor=[255,255,255];
      }
    }
  });

  y=doc.lastAutoTable.finalY+8;
  if(v('note')){
    setF(8,false);doc.setTextColor(80,80,80);
    doc.setDrawColor(26,58,92);doc.setLineWidth(0.8);
    doc.line(mL,y,mL,y+12);doc.setLineWidth(0.3);
    doc.text(v('note'),mL+4,y+5,{maxWidth:mR-mL-6});
    y+=16;
  }
  if(v('bankName')||v('bankAcc')){
    setF(8,false);doc.setTextColor(100,100,100);
    doc.text('입금계좌: '+v('bankName')+' '+v('bankAcc')+' (예금주: '+v('bankHolder')+')',mL,y);
  }

  doc.save('견적서_'+(v('bName')||'고객')+'_'+dd+'.pdf');
}
